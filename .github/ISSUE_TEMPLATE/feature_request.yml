name: Feature request
description: Suggest a transport or reliability improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        MiniTunnel builds the *transport* and forwards to services the target
        already runs. Features that reimplement SSH/VNC or add a hosted control
        plane are out of scope — see CONTRIBUTING.md.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How might it work? Note any new flags/env vars or protocol changes.
    validations:
      required: false
