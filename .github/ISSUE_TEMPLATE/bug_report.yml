name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please redact any PSK, certificate, or hostname
        you don't want public before submitting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The minimal relay / agent / client commands that trigger it.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which component?
      options:
        - relay
        - agent
        - client
        - gencert
        - not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS/arch of each side, and how the relay is reached (direct TLS, L4 SNI, or WebSocket).
    validations:
      required: false
