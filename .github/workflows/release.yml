name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Build release archives
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist
          for platform in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            stage="dist/minitunnel_${version}_${goos}_${goarch}"
            mkdir -p "$stage"
            for prog in relay agent client gencert; do
              CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
                go build -trimpath -ldflags '-s -w' -o "$stage/$prog" "./cmd/$prog"
            done
            cp README.md LICENSE "$stage/"
            tar -czf "$stage.tar.gz" -C dist "$(basename "$stage")"
            rm -r "$stage"
          done
          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
